<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG Health Monitoring</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#09111f;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color:white;
    touch-action:none;
    user-select:none;
}

canvas{
    display:block;
    background:linear-gradient(180deg, #6fd8ff 0%, #1c4d7a 100%);
    outline:none;
}

#game{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    z-index:0;
}

#ui{
    position:absolute;
    top:16px;
    left:16px;
    width:min(300px, calc(100vw - 32px));
    background:rgba(6, 12, 24, 0.82);
    backdrop-filter:blur(10px);
    color:white;
    padding:16px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 12px 30px rgba(0,0,0,0.35);
    z-index:100;
}

h2{
    margin-bottom:10px;
    font-size:22px;
}

.progress-row{
    margin-bottom:10px;
}

.label{
    font-size:13px;
    margin-bottom:4px;
    font-weight:600;
}

progress{
    width:100%;
    height:12px;
    border-radius:999px;
    overflow:hidden;
    border:none;
    appearance:none;
    background:#21324a;
}

progress::-webkit-progress-bar{
    background:#21324a;
    border-radius:999px;
}

progress::-webkit-progress-value{
    border-radius:999px;
    background:linear-gradient(90deg, #4fd1c5, #38bdf8);
}

#hpBar::-webkit-progress-value{
    background:linear-gradient(90deg, #ff5e62, #ff8f00);
}

#staminaBar::-webkit-progress-value{
    background:linear-gradient(90deg, #38bdf8, #4f46e5);
}

#hungerBar::-webkit-progress-value{
    background:linear-gradient(90deg, #f59e0b, #f97316);
}

#painBar::-webkit-progress-value{
    background:linear-gradient(90deg, #8b5cf6, #ec4899);
}

#status{
    margin-top:12px;
    border-top:1px solid rgba(255,255,255,0.18);
    padding-top:10px;
}

#mapCard{
    margin-top:12px;
    padding:10px;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.14);
}

#mapName{
    font-weight:700;
    color:#fef3c7;
    margin-bottom:4px;
}

#mapHint{
    font-size:12px;
    color:#cbd5e1;
    line-height:1.45;
}

#minimap{
    width:100%;
    height:140px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.16);
    background:rgba(2,6,23,0.7);
}

#navHint{
    margin-top:8px;
    font-size:12px;
    color:#fef3c7;
}

.status-item{
    margin:4px 0;
    font-size:13px;
}

#help{
    margin-top:12px;
    color:#fde68a;
    font-size:12px;
    line-height:1.5;
}
</style>
</head>
<body>

<div id="ui">

    <h2>🧙 Hero</h2>

    <div class="label">❤️ HP</div>
    <progress id="hpBar" max="100"></progress>

    <div class="label">⚡ Stamina</div>
    <progress id="staminaBar" max="100"></progress>

    <div class="label">🍖 Lapar</div>
    <progress id="hungerBar" max="100"></progress>

    <div class="label">🦴 Pegal</div>
    <progress id="painBar" max="100"></progress>

    <div id="status">
        <div>Penyakit : <span id="disease"></span></div>
        <div>Risiko : <span id="risk"></span></div>
        <div>Makanan : <span id="food"></span></div>
    </div>

    <div id="mapCard">
        <div class="label">🗺️ Peta</div>
        <div id="mapName">Peta</div>
        <div id="mapHint">Area kecil sesuai lokasi kita</div>
        <canvas id="minimap" width="220" height="140"></canvas>
        <div id="navHint">Jalan utama terlihat, portal ungu di ujung kanan.</div>
    </div>

    <div id="help">
        WASD = Bergerak<br>
        E = Makan<br>
        Enter = Pindah Peta
    </div>

</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const hpBar = document.getElementById("hpBar");
const staminaBar = document.getElementById("staminaBar");
const hungerBar = document.getElementById("hungerBar");
const painBar = document.getElementById("painBar");
const disease = document.getElementById("disease");
const risk = document.getElementById("risk");
const food = document.getElementById("food");
const mapName = document.getElementById("mapName");
const mapHint = document.getElementById("mapHint");
const minimap = document.getElementById("minimap");
const minimapCtx = minimap.getContext("2d");

const keys = {};
const movementKeys = ["w", "a", "s", "d", "arrowup", "arrowleft", "arrowdown", "arrowright"];

const maps = {
    small: {
        id: "small",
        name: "Kampung Kecil",
        width: 1400,
        height: 800,
        description: "Area kecil sesuai lokasi kita dengan rumah, pohon, dan jalan sederhana.",
        portal: { x: 1310, y: 350, w: 36, h: 54 },
        spawn: { x: 520, y: 240 },
        houses: [
            { x: 120, y: 140, w: 180, h: 120 },
            { x: 860, y: 320, w: 180, h: 120 }
        ],
        trees: [
            { x: 180, y: 180 },
            { x: 320, y: 620 },
            { x: 720, y: 220 },
            { x: 1030, y: 320 },
            { x: 1220, y: 520 }
        ],
        rocks: [
            { x: 500, y: 400 },
            { x: 860, y: 250 },
            { x: 1120, y: 650 }
        ]
    },
    large: {
        id: "large",
        name: "Wilayah Luas",
        width: 2400,
        height: 1300,
        description: "Area besar yang bisa dijelajahi dengan suasana padang, hutan, dan gunung.",
        portal: { x: 30, y: 560, w: 36, h: 54 },
        spawn: { x: 2200, y: 600 },
        houses: [
            { x: 240, y: 300, w: 170, h: 120 },
            { x: 1720, y: 850, w: 200, h: 140 }
        ],
        trees: [
            { x: 350, y: 220 },
            { x: 860, y: 760 },
            { x: 1180, y: 420 },
            { x: 1460, y: 260 },
            { x: 1860, y: 520 },
            { x: 2100, y: 900 }
        ],
        rocks: [
            { x: 540, y: 430 },
            { x: 1320, y: 600 },
            { x: 1940, y: 280 },
            { x: 2140, y: 240 }
        ],
        zones: [
            { type: "padang", x: 0, y: 0, w: 800, h: 1300 },
            { type: "hutan", x: 800, y: 0, w: 900, h: 1300 },
            { type: "gunung", x: 1700, y: 0, w: 700, h: 1300 }
        ],
        rivers: [{ x: 960, y: 180, w: 300, h: 720 }]
    }
};

let currentMapId = "small";
let currentMap = maps.small;
let camera = { x: 0, y: 0 };
let portalCooldown = 0;
let dayTime = 0;
let lastTime = performance.now();

function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
}

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    updateCamera();
    player.x = clamp(player.x, 0, currentMap.width - player.size);
    player.y = clamp(player.y, 0, currentMap.height - player.size);
}

function updateCamera() {
    const targetX = player.x + player.size / 2 - canvas.width / 2;
    const targetY = player.y + player.size / 2 - canvas.height / 2;
    camera.x = clamp(targetX, 0, Math.max(0, currentMap.width - canvas.width));
    camera.y = clamp(targetY, 0, Math.max(0, currentMap.height - canvas.height));
}

window.addEventListener("resize", resizeCanvas);

function focusGame() {
    canvas.tabIndex = 0;
    canvas.focus({ preventScroll: true });
}

canvas.addEventListener("mousedown", focusGame);
canvas.addEventListener("touchstart", focusGame, { passive: true });

function handleKeyDown(e) {
    const key = e.key.toLowerCase();
    if (movementKeys.includes(key) || key === "enter") e.preventDefault();
    keys[key] = true;

    if (key === "e") {
        if (player.inventory.food > 0) {
            player.inventory.food--;
            player.hunger = Math.min(100, player.hunger + 30);
            player.hp = Math.min(100, player.hp + 10);
        }
    }
}

function handleKeyUp(e) {
    keys[e.key.toLowerCase()] = false;
}

document.addEventListener("keydown", handleKeyDown);
document.addEventListener("keyup", handleKeyUp);

window.addEventListener("blur", () => {
    for (const key of Object.keys(keys)) keys[key] = false;
});

const player = {
    x: maps.small.spawn.x,
    y: maps.small.spawn.y,
    size: 34,
    speed: 2.8,
    hp: 100,
    stamina: 100,
    hunger: 100,
    pain: 0,
    disease: "Sehat",
    direction: 0,
    walkCycle: 0,
    isMoving: false,
    inventory: { food: 5 }
};

const monster = {
    x: 1000,
    y: 500,
    size: 42,
    hp: 50
};

window.__gameState = {
    getPlayer: () => ({ x: player.x, y: player.y, isMoving: player.isMoving, direction: player.direction })
};

function placeMonsterForMap() {
    if (currentMapId === "small") {
        monster.x = 1000;
        monster.y = 500;
    } else {
        monster.x = 1500;
        monster.y = 280;
    }
}

function collidesWithObstacle(x, y, size) {
    if (x < 0 || y < 0 || x + size > currentMap.width || y + size > currentMap.height) {
        return true;
    }

    for (const house of currentMap.houses) {
        if (x + size > house.x && x < house.x + house.w && y + size > house.y && y < house.y + house.h) {
            return true;
        }
    }

    for (const tree of currentMap.trees) {
        const dx = (x + size / 2) - (tree.x + 5);
        const dy = (y + size / 2) - (tree.y + 18);
        if (Math.hypot(dx, dy) < 28 + size / 2) {
            return true;
        }
    }

    for (const rock of currentMap.rocks) {
        const dx = (x + size / 2) - rock.x;
        const dy = (y + size / 2) - rock.y;
        if (Math.hypot(dx, dy) < 24 + size / 2) {
            return true;
        }
    }

    return false;
}

function switchMap() {
    currentMapId = currentMapId === "small" ? "large" : "small";
    currentMap = maps[currentMapId];
    player.x = currentMap.spawn.x;
    player.y = currentMap.spawn.y;
    placeMonsterForMap();
    updateCamera();
}

function isNearPortal() {
    const portal = currentMap.portal;
    const px = player.x + player.size / 2;
    const py = player.y + player.size / 2;
    const cx = portal.x + portal.w / 2;
    const cy = portal.y + portal.h / 2;
    return Math.hypot(px - cx, py - cy) < 90;
}

function updatePlayer(dt) {
    let moveX = 0;
    let moveY = 0;

    if (keys["w"] || keys["arrowup"]) moveY -= 1;
    if (keys["s"] || keys["arrowdown"]) moveY += 1;
    if (keys["a"] || keys["arrowleft"]) moveX -= 1;
    if (keys["d"] || keys["arrowright"]) moveX += 1;

    player.isMoving = moveX !== 0 || moveY !== 0;

    if (player.isMoving) {
        const len = Math.hypot(moveX, moveY) || 1;
        moveX /= len;
        moveY /= len;

        player.direction = Math.atan2(moveY, moveX);
        player.walkCycle += 0.25 * dt;

        let currentSpeed = player.speed * 1.25;
        if (player.stamina <= 20) {
            currentSpeed *= 0.7;
        }

        const nextX = player.x + moveX * currentSpeed * dt;
        const nextY = player.y + moveY * currentSpeed * dt;

        if (!collidesWithObstacle(nextX, player.y, player.size)) {
            player.x = nextX;
        }
        if (!collidesWithObstacle(player.x, nextY, player.size)) {
            player.y = nextY;
        }

        player.stamina = Math.max(0, player.stamina - 0.08 * dt);
        player.hunger = Math.max(0, player.hunger - 0.03 * dt);
        player.pain = Math.min(100, player.pain + 0.015 * dt);
    } else {
        player.walkCycle = 0;
    }

    player.stamina = Math.min(100, player.stamina + 0.03 * dt);
    player.hunger = Math.max(0, player.hunger);
    player.pain = Math.min(100, player.pain);

    if (player.hunger < 20) {
        player.speed = 2.1;
    } else if (player.pain > 80) {
        player.speed = 1.4;
    } else {
        player.speed = 2.8;
    }

    if (player.hunger <= 0) {
        player.hp -= 0.04 * dt;
    }

    player.hp = Math.max(0, player.hp);
    player.x = clamp(player.x, 0, currentMap.width - player.size);
    player.y = clamp(player.y, 0, currentMap.height - player.size);

    portalCooldown = Math.max(0, portalCooldown - dt * 0.06);
    if (keys["enter"] && portalCooldown <= 0 && isNearPortal()) {
        switchMap();
        portalCooldown = 0.8;
    }
}

function updateMonster(dt) {
    const dx = player.x - monster.x;
    const dy = player.y - monster.y;
    const distance = Math.hypot(dx, dy);

    if (distance < 260) {
        const step = 0.8 * dt;
        monster.x += (dx / distance) * step;
        monster.y += (dy / distance) * step;
    }

    if (distance < 46) {
        player.hp -= 0.08 * dt;
    }
}

function diseaseSystem() {
    if (player.hunger < 10 && player.pain > 70) {
        player.disease = "Demam";
        player.hp -= 0.03;
    } else if (player.hp < 30) {
        player.disease = "Kritis";
    } else {
        player.disease = "Sehat";
    }
}

function getRiskLevel() {
    let score = 0;

    if (player.hp < 50) score++;
    if (player.hunger < 30) score++;
    if (player.pain > 60) score++;

    if (score === 0) return "Normal";
    if (score === 1) return "Rendah";
    if (score === 2) return "Sedang";
    return "Tinggi";
}

function drawGround() {
    const map = currentMap;
    const brightness = 60 + Math.sin(dayTime) * 35;

    const gradient = ctx.createLinearGradient(0, 0, 0, map.height);
    if (map.id === "small") {
        gradient.addColorStop(0, `rgb(${90 + brightness * 0.18}, ${150 + brightness * 0.24}, ${205 + brightness * 0.14})`);
        gradient.addColorStop(1, `rgb(${22 + brightness * 0.09}, ${76 + brightness * 0.15}, ${112 + brightness * 0.07})`);
    } else {
        gradient.addColorStop(0, `rgb(${120 + brightness * 0.12}, ${200 + brightness * 0.2}, ${160 + brightness * 0.1})`);
        gradient.addColorStop(1, `rgb(${28 + brightness * 0.08}, ${94 + brightness * 0.12}, ${90 + brightness * 0.03})`);
    }

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, map.width, map.height);

    if (map.id === "small") {
        ctx.fillStyle = "rgba(120, 200, 80, 0.28)";
        ctx.fillRect(0, map.height * 0.72, map.width, map.height * 0.28);
        ctx.fillStyle = "#d8b36b";
        ctx.fillRect(0, map.height * 0.56, map.width, map.height * 0.08);
        ctx.fillStyle = "#c9a74b";
        ctx.fillRect(140, 130, 980, 24);
        ctx.fillRect(140, 154, 24, 420);
        ctx.fillRect(400, 154, 24, 280);
        ctx.fillRect(720, 154, 24, 360);
        ctx.fillRect(1040, 154, 24, 260);
        ctx.fillStyle = "rgba(255, 240, 170, 0.65)";
        ctx.beginPath();
        ctx.arc(map.width - 180, 120, 55 + Math.sin(dayTime * 0.8) * 6, 0, Math.PI * 2);
        ctx.fill();
    } else {
        ctx.fillStyle = "rgba(96, 177, 84, 0.35)";
        ctx.fillRect(0, 0, map.width, map.height);
        map.zones.forEach((zone) => {
            if (zone.type === "padang") {
                ctx.fillStyle = "rgba(184, 230, 130, 0.35)";
            } else if (zone.type === "hutan") {
                ctx.fillStyle = "rgba(66, 128, 71, 0.32)";
            } else {
                ctx.fillStyle = "rgba(139, 148, 157, 0.35)";
            }
            ctx.fillRect(zone.x, zone.y, zone.w, zone.h);
        });

        ctx.fillStyle = "rgba(88, 144, 255, 0.45)";
        map.rivers.forEach((river) => {
            ctx.fillRect(river.x, river.y, river.w, river.h);
        });
    }
}

function drawMapObjects() {
    if (currentMap.id === "small") {
        ctx.fillStyle = "rgba(255,255,255,0.15)";
        ctx.fillRect(90, 110, 1040, 500);
    }

    currentMap.houses.forEach((house) => {
        ctx.save();
        ctx.translate(house.x, house.y);
        ctx.shadowColor = "rgba(0,0,0,0.22)";
        ctx.shadowBlur = 6;
        ctx.fillStyle = "#8b5e3c";
        ctx.fillRect(0, 0, house.w, house.h);
        ctx.fillStyle = "#c96d3d";
        ctx.fillRect(8, -26, house.w - 16, 36);
        ctx.fillStyle = "#fef3c7";
        ctx.fillRect(house.w * 0.4, house.h * 0.65, 24, 36);
        ctx.restore();
    });

    currentMap.trees.forEach((tree, index) => {
        const sway = Math.sin(dayTime * 2 + index) * 4;
        ctx.save();
        ctx.translate(tree.x, tree.y);
        ctx.shadowColor = "rgba(0,0,0,0.25)";
        ctx.shadowBlur = 6;
        ctx.fillStyle = "#5b3b2f";
        ctx.fillRect(0, 0, 10, 36);
        ctx.fillStyle = currentMap.id === "small" ? "#2e8b57" : "#3f7d20";
        ctx.beginPath();
        ctx.arc(5 + sway, 5, 18, 0, Math.PI * 2);
        ctx.arc(18 + sway, 12, 15, 0, Math.PI * 2);
        ctx.arc(-8 + sway, 12, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    });

    currentMap.rocks.forEach((rock) => {
        ctx.save();
        ctx.translate(rock.x, rock.y);
        ctx.shadowColor = "rgba(0,0,0,0.22)";
        ctx.shadowBlur = 5;
        ctx.fillStyle = "#7a7f86";
        ctx.beginPath();
        ctx.moveTo(-16, 8);
        ctx.lineTo(-6, -16);
        ctx.lineTo(12, -12);
        ctx.lineTo(18, 6);
        ctx.lineTo(6, 16);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    });

    const portal = currentMap.portal;
    ctx.save();
    ctx.translate(portal.x, portal.y);
    ctx.fillStyle = "#7c3aed";
    ctx.fillRect(0, 0, portal.w, portal.h);
    ctx.fillStyle = "#c4b5fd";
    ctx.fillRect(8, 8, portal.w - 16, portal.h - 16);
    ctx.restore();
}

function drawMonster() {
    const bob = Math.sin(dayTime * 4) * 3;

    ctx.save();
    ctx.translate(monster.x, monster.y + bob);
    ctx.shadowColor = "rgba(0,0,0,0.25)";
    ctx.shadowBlur = 8;
    ctx.fillStyle = "#e11d48";
    ctx.beginPath();
    ctx.arc(20, 20, 20, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(15, 16, 3, 0, Math.PI * 2);
    ctx.arc(25, 16, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(20, 24, 8, 0.1, Math.PI - 0.1);
    ctx.stroke();
    ctx.restore();
}

function drawPlayer() {
    const bob = player.isMoving ? Math.sin(player.walkCycle * 4) * 2.5 : 0;

    ctx.save();
    ctx.translate(player.x + player.size / 2 - camera.x, player.y + player.size / 2 + bob - camera.y);
    ctx.rotate(player.direction);
    ctx.translate(-player.size / 2, -player.size / 2);
    ctx.shadowColor = "rgba(0,0,0,0.35)";
    ctx.shadowBlur = 12;

    ctx.fillStyle = "#0f172a";
    ctx.beginPath();
    ctx.arc(17, 14, 12, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#f8fafc";
    ctx.fillRect(8, 4, 18, 10);
    ctx.fillStyle = "#2563eb";
    ctx.fillRect(7, 12, 20, 18);
    ctx.fillStyle = "#f59e0b";
    ctx.fillRect(8, 30, 18, 6);
    ctx.fillStyle = "#111827";
    ctx.fillRect(11, 7, 3, 3);
    ctx.fillRect(20, 7, 3, 3);

    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.fillRect(9, 20, 16, 4);
    ctx.restore();
}

function drawMiniMap() {
    minimapCtx.clearRect(0, 0, minimap.width, minimap.height);
    minimapCtx.fillStyle = "#0f172a";
    minimapCtx.fillRect(0, 0, minimap.width, minimap.height);

    const scaleX = minimap.width / currentMap.width;
    const scaleY = minimap.height / currentMap.height;
    const scale = Math.min(scaleX, scaleY);

    minimapCtx.save();
    minimapCtx.scale(scale, scale);
    minimapCtx.translate(0, 0);

    minimapCtx.fillStyle = currentMap.id === "small" ? "#4ade80" : "#64748b";
    minimapCtx.fillRect(0, 0, currentMap.width, currentMap.height);

    minimapCtx.fillStyle = "#fbbf24";
    minimapCtx.fillRect(0, currentMap.height * 0.56, currentMap.width, currentMap.height * 0.08);
    minimapCtx.fillStyle = "#1f2937";
    currentMap.houses.forEach((house) => {
        minimapCtx.fillRect(house.x, house.y, house.w, house.h);
    });

    minimapCtx.fillStyle = currentMap.id === "small" ? "#3b82f6" : "#38bdf8";
    minimapCtx.fillRect(player.x, player.y, player.size, player.size);
    minimapCtx.fillStyle = "#a78bfa";
    minimapCtx.fillRect(currentMap.portal.x, currentMap.portal.y, currentMap.portal.w, currentMap.portal.h);
    minimapCtx.restore();
}

function updateUI() {
    hpBar.value = player.hp;
    staminaBar.value = player.stamina;
    hungerBar.value = player.hunger;
    painBar.value = player.pain;

    disease.innerText = player.disease;
    risk.innerText = getRiskLevel();
    food.innerText = player.inventory.food;
    mapName.innerText = currentMap.name;
    mapHint.innerText = currentMap.description;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-camera.x, -camera.y);
    drawGround();
    drawMapObjects();
    drawMonster();
    drawPlayer();
    ctx.restore();
}

function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 16.67, 1.8);
    lastTime = now;

    dayTime += 0.002 * dt;
    updatePlayer(dt);
    updateMonster(dt);
    diseaseSystem();
    updateUI();
    draw();
    drawMiniMap();

    requestAnimationFrame(gameLoop);
}

setInterval(() => {
    player.hunger = Math.max(0, player.hunger - 1);
    player.pain = Math.min(100, player.pain + 0.3);
    if (player.stamina < 100) player.stamina = Math.min(100, player.stamina + 0.5);
}, 5000);

focusGame();
placeMonsterForMap();
resizeCanvas();
updateCamera();
gameLoop(performance.now());
</script>
